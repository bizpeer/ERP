# ============================================================
# Kubernetes Manifests - ERP SaaS
# ============================================================

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: erp-saas
  labels:
    name: erp-saas

---
# ─── ConfigMap ────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: erp-config
  namespace: erp-saas
data:
  NODE_ENV: "production"
  AUTH_SERVICE_URL: "http://auth-service:3001"
  SALES_SERVICE_URL: "http://sales-service:3002"
  PURCHASE_SERVICE_URL: "http://purchase-service:3003"
  INVENTORY_SERVICE_URL: "http://inventory-service:3004"
  PRODUCTION_SERVICE_URL: "http://production-service:3005"
  ACCOUNTING_SERVICE_URL: "http://accounting-service:3006"
  TENANT_SERVICE_URL: "http://tenant-service:3007"
  EXCEL_ENGINE_URL: "http://excel-engine:3008"

---
# ─── API Gateway ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: erp-saas
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: erp-saas/api-gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: erp-config
            - secretRef:
                name: erp-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: erp-saas
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP

---
# ─── Ingress ─────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erp-ingress
  namespace: erp-saas
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.erp.com
        - "*.erp.com"
      secretName: erp-tls-secret
  rules:
    - host: api.erp.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80

---
# ─── Auth Service ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: erp-saas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: erp-saas/auth-service:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: erp-config
            - secretRef:
                name: erp-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: erp-saas
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001

---
# ─── Sales Service ────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sales-service
  namespace: erp-saas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sales-service
  template:
    metadata:
      labels:
        app: sales-service
    spec:
      containers:
        - name: sales-service
          image: erp-saas/sales-service:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: erp-config
            - secretRef:
                name: erp-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: sales-service
  namespace: erp-saas
spec:
  selector:
    app: sales-service
  ports:
    - port: 3002
      targetPort: 3002

---
# ─── Inventory Service ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: erp-saas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: erp-saas/inventory-service:latest
          ports:
            - containerPort: 3004
          envFrom:
            - configMapRef:
                name: erp-config
            - secretRef:
                name: erp-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: erp-saas
spec:
  selector:
    app: inventory-service
  ports:
    - port: 3004
      targetPort: 3004

---
# ─── HPA (Auto Scaling) ──────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: erp-saas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sales-service-hpa
  namespace: erp-saas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sales-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# ─── PostgreSQL (Production: use RDS or CloudNativePG) ──────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: erp-saas
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: erp_main
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: erp-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erp-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "fast-ssd"
        resources:
          requests:
            storage: 100Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: erp-saas
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None

---
# ─── Redis ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: erp-saas
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--maxmemory", "1gb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: erp-saas
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
